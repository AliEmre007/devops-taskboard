name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  node-tests:
    name: Node.js tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: npm run lint

      - name: Run tests
        run: npm test

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: node-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devops-taskboard-api:${{ github.sha }} ./app

  compose-smoke-test:
    name: Docker Compose migration and smoke test
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create environment file
        run: cp .env.example .env

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Start Docker Compose stack
        run: make up

      - name: Show running services
        run: make ps

      - name: Wait for Nginx health endpoint
        run: |
          for i in {1..30}; do
            if curl --fail --silent http://localhost:8080/health; then
              echo
              echo "Application is healthy."
              exit 0
            fi

            echo "Waiting for application to become healthy... attempt $i"
            sleep 2
          done

          echo "Application did not become healthy in time."
          docker compose ps
          docker compose logs
          exit 1

      - name: Run database migrations
        run: make migrate

      - name: Show applied migrations
        run: |
          docker compose exec -T postgres psql \
            -U taskboard_user \
            -d taskboard \
            -c "SELECT * FROM schema_migrations ORDER BY applied_at;"

      - name: Smoke test health endpoint through Nginx
        run: curl --fail http://localhost:8080/health

      - name: Smoke test readiness endpoint through Nginx
        run: curl --fail http://localhost:8080/ready

      - name: Smoke test metrics endpoint through Nginx
        run: curl --fail --silent http://localhost:8080/metrics | head -40

      - name: Check Prometheus health
        run: curl --fail http://localhost:9090/-/healthy

      - name: Create test task through Nginx
        run: |
          curl --fail -X POST http://localhost:8080/tasks \
            -H "Content-Type: application/json" \
            -d '{"title":"CI migration smoke test task"}'

      - name: List tasks through Nginx
        run: curl --fail http://localhost:8080/tasks

      - name: Show logs if something failed
        if: failure()
        run: docker compose logs

      - name: Stop Docker Compose stack
        if: always()
        run: docker compose down
